<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MILKY-SHOP</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d0d0d'/%3E%3Ccircle cx='16' cy='16' r='10' fill='%239333ea'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23a855f7'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23c084fc'/%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>

</head>
<body>

<header>
  <div class="logo">MILKY<span>-SHOP</span></div>
  <button class="cart-btn" onclick="openCart()">
    <span class="cart-icon">🛒</span>
    Корзина
    <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<div class="hero">
  <div class="hero-label">Онлайн магазин · Лучшие цены</div>
  <h1>Лучшие предметы<br/><em>для выживания</em></h1>
  <p>Первый и единственный онлайн магазин на ZW.</p>
</div>

<div class="section-label">Каталог предметов</div>
<div class="categories" id="categoryBar"></div>
<div class="products-grid" id="productsGrid"></div>

<div class="overlay" id="cartOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="cartModal">
    <button class="modal-close" onclick="closeCart()">✕</button>
    <div id="cartScreen"></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastText"></span></div>

<script src="script.js" defer></script>

<footer class="site-footer">
  © 2026 MillerSpk — Сделано для ZW с <span>💜</span>
</footer>

<button class="feedback-btn" id="feedbackBtn" onclick="toggleFeedback()" title="Написать нам">💬</button>

<div class="feedback-popup" id="feedbackPopup">
  <div id="feedbackContent">
    <h3>Обратная связь</h3>
    <p>Жалоба, идея или отзыв — нам важно всё</p>
    <div class="feedback-types">
      <button class="feedback-type-btn active" id="ft-review" onclick="setFeedbackType('Отзыв')">
        <span class="ft-icon">⭐</span>Отзыв
      </button>
      <button class="feedback-type-btn" id="ft-idea" onclick="setFeedbackType('Идея')">
        <span class="ft-icon">💡</span>Идея
      </button>
      <button class="feedback-type-btn" id="ft-complaint" onclick="setFeedbackType('Жалоба')">
        <span class="ft-icon">⚠️</span>Жалоба
      </button>
    </div>
    <input type="text" id="feedbackNick" placeholder="Ваш никнейм..." style="margin-bottom:8px" />
    <textarea class="feedback-textarea" id="feedbackText" placeholder="Напишите ваше сообщение..."></textarea>
    <button class="feedback-send-btn" id="feedbackSendBtn" onclick="sendFeedback()">Отправить</button>
  </div>
</div>

</body>
</html>
